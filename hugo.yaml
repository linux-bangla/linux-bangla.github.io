# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://linux-bangla.github.io"
title: Linux Bangla Blog
copyright: "© 2024 [Linux Bangla Community](https://t.me/linux_bangla)"
theme: [PaperMod]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: true
  # minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: Archive
          url: archives
          weight: 5
        - name: Search
          url: search/
          weight: 10
        - name: Tags
          url: tags/
          weight: 10
        - name: Telegram
          url: https://t.me/linux_bangla

    # custom params for each language should be under [langcode].parms - hugo v0.120.0
    params:
      profileMode:
        enabled: false
        title: PaperMod
        imageUrl: "https://raw.githubusercontent.com/googlefonts/noto-emoji/master/svg/emoji_u1f9d1_1f3fb_200d_1f4bb.svg"
        imageTitle: ProfileMode image
        # imageWidth: 120
        # imageHeight: 120
        subtitle: "A Linux based community by Bangladeshi minds!"
        buttons:
          - name: Blog
            url: posts
          - name: Telegram
            url: https://t.me/linux_bangla

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  description: "Theme PaperMod - https://github.com/adityatelange/hugo-PaperMod"
  author: Linux Bangla
  # author: ["Me", "You"] # multiple authors

  defaultTheme: auto
  # disableThemeToggle: true
  ShowShareButtons: true
  ShowReadingTime: true
  # disableSpecial1stPost: true
  displayFullLangName: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  ShowPageNums: true
  ShowToc: true
  # comments: false
  images: ["assets/images/cover.png"]

  profileMode:
    enabled: false
    title: PaperMod
    imageUrl: "#"
    imageTitle: my image
    # imageWidth: 120
    # imageHeight: 120
    buttons:
      - name: Archives
        url: archives
      - name: Tags
        url: tags

  homeInfoParams:
    Title: "লিনাক্স বাংলা ব্লগ"
    Content: >
      👋 আমাদের লিনাক্স বাংলা ব্লগে আপনাকে স্বাগত!
      ✨ আমাদের নিজেদের মধ্যে জ্ঞানের একটি প্রবাহমান জ্ঞানের একটি আবেশ সৃষ্টি করতে এবং অর্জিত জ্ঞানকে সবার মাঝে ভাগাভাগি করে নিতে, আমাদের নিজেদের হাতে গড়া একটি প্লাটফর্ম।
      🎯 এখানে আমাদের কমিউনিটির যে কেউ নিবন্ধ রচনা এবং একে অন্যের ভুল-সংশোধনের সুযোগ পাবেন।


  socialIcons:
    - name: github
      title: View Source on Github
      url: "https://github.com/linux-bangla"
    - name: Telegram
      title: Join telegram community
      url: "https://t.me/linux_bangla"
    - name: YouTube
      title: Explore our YouTube contents!
      url: ""
    - name: discord
      title: Explore our discord server
      url: ""
    - name: matrix
      title: Explore our matrix room
      url: ""
    - name: RSS
      title: Subscribe to our RSS
      url: ""

  editPost:
    URL: "https://github.com/linux-bangla/linux-bangla.github.io/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # label:
  # iconSVG: '<svg xmlns="http://www.w3.org/2000/svg" height="25" viewBox="0 -960 960 960" fill="currentColor"><path d="M320-240h320v-80H320v80Zm0-160h320v-80H320v80ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z"/></svg>'
  # text: "Home"
  icon: "/assets/icons/favicon-32x32.png"
  iconHeight: 35

  # analytics:
  #     google:
  #         SiteVerificationTag: "XYZabc"

  assets:
    disableHLJS: true
    favicon: "/assets/icons/android-icon-48x48.png"
    favicon16x16: "/assets/icons/favicon-16x16.png"
    favicon32x32: "/assets/icons/favicon-32x32.png"
    apple_touch_icon: "/assets/icons/apple-icon.png"
    safari_pinned_tab: "/assets/icons/apple-icon.png"

  # cover:
  #     hidden: true # hide everywhere but not in structured data
  #     hiddenInList: true # hide on list pages and home
  #     hiddenInSingle: true # hide on single page

  # fuseOpts:
  #     isCaseSensitive: false
  #     shouldSort: true
  #     location: 0
  #     distance: 1000
  #     threshold: 0.4
  #     minMatchCharLength: 0
  #     keys: ["title", "permalink", "summary", "content"]

markup:
  goldmark:
    renderer:
      unsafe: true
    renderHooks:
      link:
        enableDefault: true
      image:
        enableDefault: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

# privacy:
